name: Desktop EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "app.js"
      - "index.html"
      - "styles.css"
      - "desktop_launcher.py"
      - "desktop_launcher.spec"
      - ".github/workflows/desktop-exe.yml"

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pywebview

      - name: Build EXE
        run: pyinstaller desktop_launcher.spec --noconfirm

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-artifacts | Out-Null
          Copy-Item dist/PrywatnyPortfel.exe build-artifacts/prywatny-portfel-desktop.exe
          Compress-Archive -Path dist/PrywatnyPortfel.exe -DestinationPath build-artifacts/prywatny-portfel-desktop-win.zip -Force

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: prywatny-portfel-desktop-exe
          path: |
            build-artifacts/prywatny-portfel-desktop.exe
            build-artifacts/prywatny-portfel-desktop-win.zip
          retention-days: 30

  release-exe:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-exe
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: prywatny-portfel-desktop-exe
          path: dist

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/prywatny-portfel-desktop.exe
            dist/prywatny-portfel-desktop-win.zip
          generate_release_notes: true
