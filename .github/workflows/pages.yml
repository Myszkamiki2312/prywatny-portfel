name: GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "reset-password.html"
      - "confirm-email.html"
      - "app.js"
      - "styles.css"
      - "supabase-config.js"
      - "frontend/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p public
          cp index.html app.js styles.css supabase-config.js reset-password.html confirm-email.html public/
          cp -R frontend public/frontend

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
