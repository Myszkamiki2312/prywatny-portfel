name: Supabase Keep-Alive

# Supabase free tier pauses a project after ~7 days of inactivity. A small daily request keeps the
# project (Auth + app_states) awake so the live site login never hits a paused backend.

on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://kcvrgbzluyjvuynqoezd.supabase.co' }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'sb_publishable_g9Ki1EBtOPDFyErEVcqajA_29nJZANV' }}
    steps:
      - name: Ping Supabase (exercise Postgres + Auth origin)
        run: |
          set -uo pipefail
          probe() {
            local url="$1" label="$2" code
            code=$(curl -s -m 30 --retry 2 --retry-delay 5 \
                     -H "apikey: ${SUPABASE_ANON_KEY}" \
                     -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "${label}: HTTP ${code}"
            case "$code" in
              000|502|503|520|521|522|523|530) return 1 ;;
              *) return 0 ;;
            esac
          }
          ok=0
          probe "${SUPABASE_URL}/rest/v1/app_states?select=user_id&limit=1" "rest/app_states" && ok=1 || true
          probe "${SUPABASE_URL}/auth/v1/health" "auth/health" && ok=1 || true
          if [ "$ok" -ne 1 ]; then
            echo "Supabase looks paused/unreachable — resume it from the dashboard." >&2
            exit 1
          fi
          echo "Keep-alive OK."
